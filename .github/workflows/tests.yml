name: tests

on:
  pull_request:
  push:
    branches: ["main", "upgrade_2.0"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch first to keep CI fast
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,yaml]"

      - name: Install optional framework adapters
        run: |
          pip install lightning>=2.0 transformers>=4.30 || true

      - name: Run tests
        run: |
          python -m pytest --cov=src/hotcb --cov-report=term-missing
