  # While training is running:
  #
  #Create a new file, e.g. /tmp/my_diag.py - copy from ./callbacks/my_diag.py
  #Edit examples/hotcb.yaml and add below yaml content
  #Save. Within a few steps (depending on debounce_steps) it’s loaded and running.
  #
  #
  #Notes / constraints (so it behaves predictably)
  #
  #This is safe-point only: adapters call apply() at step boundaries; no mid-backward hijinks.
  #
  #“Remove” is disable (no detach). If you later want memory cleanup, use unload op (already supported).
  #
  #If a callback crashes, controller can auto-disable it (enabled by default).
  #
  #No DDP support (as requested). Adding it later = broadcast ops from rank0.

  my_diag:
    enabled: true
    target:
      kind: python_file
      path: /tmp/my_diag.py
      symbol: MyDiag
    init:
      msg: "live loaded!"