version: 1
callbacks:
  print_metrics:
    enabled: true
    target:
      kind: python_file
      path: examples/callbacks/print_metrics.py
      symbol: PrintMetricsCallback
    init:
      every: 20
      prefix: "[metrics]"
    params:
      every: 20

  feat_viz:
    enabled: false
    target:
      kind: python_file
      path: examples/callbacks/feat_viz.py
      symbol: FeatureVizCallback
    init:
      every: 100
      out_dir: debug/features