site_name: hotcb
repo_url: https://github.com/sidphbot/hotcb
repo_name: sidphbot/hotcb

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2
            members_order: source
            inherited_members: true
            merge_init_into_class: true
            docstring_section_style: spacy
            show_root_heading: true
            show_root_full_path: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - CLI Reference: cli.md
  - Formats: formats.md
  - Replay: replay.md
  - Modules:
      - Callbacks (cb): modules/cb.md
      - Optimizer (opt): modules/hotopt.md
      - Loss (loss): modules/hotloss.md
  - API:
      - Overview: api/index.md
      - Controller: api/controller.md
      - Adapters: api/adapters.md
      - Callbacks: api/callbacks.md
      - Config: api/config.md
      - CLI: api/cli.md
      - Loader: api/loader.md
  - Examples:
      - CLI Walkthrough: examples/cli_walkthrough.md
      - Custom Callback: examples/custom_callback_example.py
